{% load static %}
<!DOCTYPE html>
<html>

<head>
    <title>Password Reset Complete | MyStore</title>
    <link rel="stylesheet" href="{% static 'css/auth-login.css' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>

<body class="auth-body">

    <div class="auth-card">
        <div class="auth-header">
            <i class="fas fa-check-circle" style="font-size: 3rem; color: #4CAF50;"></i>
            <h2>Password Reset Complete</h2>
            <p>Your password has been successfully reset</p>
        </div>

        <div style="text-align: center; padding: 20px;">
            <p style="margin-bottom: 15px;">
                You can now log in with your new password.
            </p>
        </div>

        <div style="text-align: center; margin-top: 20px;">
            <a href="{% url 'login' %}" class="auth-btn"
                style="display: inline-block; text-decoration: none; padding: 12px 30px;">
                Login Now
            </a>
        </div>

        <p class="auth-footer">
            <a href="{% url 'home' %}">Go to homepage</a>
        </p>
    </div>

</body>

</html>
